<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 新闻聚合 · Horizon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: #f8f9fa; color: #1a1a2e; line-height: 1.7;
    }
    header {
      text-align: center; padding: 40px 20px 24px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    header h1 { color: #fff; font-size: 1.8rem; }
    header p { color: rgba(255,255,255,.7); font-size: .9rem; margin-top: 4px; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

    .news-item {
      background: #fff; border-radius: 12px; padding: 20px 24px;
      margin-bottom: 12px; border: 1px solid #e9ecef;
      transition: all .2s; position: relative;
    }
    .news-item:hover { border-color: #adb5bd; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .news-item .rank {
      position: absolute; left: -8px; top: 20px;
      background: #1a1a2e; color: #fff; width: 24px; height: 24px;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
    }
    .news-item .score {
      display: inline-block; font-size: .78rem; font-weight: 600;
      padding: 1px 8px; border-radius: 4px; margin-left: 8px;
    }
    .score-high { background: #d3f9d8; color: #2b8a3e; }
    .score-mid { background: #fff3bf; color: #e67700; }
    .news-item h3 { font-size: 1rem; margin: 0 0 6px 16px; }
    .news-item h3 a { color: #1a1a2e; text-decoration: none; }
    .news-item h3 a:hover { color: #1971c2; text-decoration: underline; }
    .news-item .meta {
      font-size: .78rem; color: #868e96; margin-left: 16px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .news-item .summary {
      font-size: .88rem; color: #495057; margin: 8px 0 0 16px;
      line-height: 1.6;
    }
    .tools-bar {
      margin: 32px 0; display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
    }
    .tools-bar a {
      background: #fff; border: 1px solid #dee2e6; border-radius: 20px;
      padding: 6px 16px; font-size: .82rem; text-decoration: none; color: #495057;
      transition: all .2s;
    }
    .tools-bar a:hover { border-color: #1971c2; color: #1971c2; }
    .loading { text-align: center; padding: 80px 0; color: #868e96; }
    .loading .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid #dee2e6; border-top-color: #1971c2;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 40px; color: #e67700; }
    .footer {
      margin-top: 40px; padding: 20px 0; text-align: center;
      border-top: 1px solid #dee2e6; color: #868e96; font-size: .82rem;
    }
    .footer a { color: #1971c2; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .news-item { padding: 16px; }
      .news-item .rank { display: none; }
      .news-item h3 { margin-left: 0; }
      .news-item .meta { margin-left: 0; }
      .news-item .summary { margin-left: 0; }
    }
  </style>
</head>
<body>
<header>
  <h1>📡 AI 新闻速览</h1>
  <p id="subtitle">自动加载最新日报...</p>
</header>

<div class="container">
  <div id="news-list">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top:16px">正在加载最新新闻...</p>
    </div>
  </div>

  <div class="tools-bar">
    <span style="font-size:.82rem;color:#868e96;padding:6px 0">🔧 推荐工具：</span>
    <a href="https://github.com/sansan0/TrendRadar" target="_blank">⭐ TrendRadar</a>
    <a href="https://github.com/Xiaoseymy/newspaper" target="_blank">⭐ Newspaper</a>
    <a href="https://github.com/Thysrael/Horizon" target="_blank">⭐ Horizon</a>
    <a href="https://github.com/jx-177/finance-inform" target="_blank">⭐ Finance-Inform</a>
    <a href="https://github.com/ArvinLovegood/go-stock" target="_blank">⭐ go-stock</a>
    <a href="https://github.com/DGLLD/Global-Financial-News-Access" target="_blank">⭐ Global-Financial</a>
  </div>

  <div class="footer">
    由 <a href="https://github.com/bat-man-101/Horizon" target="_blank">Horizon AI 新闻雷达</a> 驱动 · 每天 10:00 自动更新
  </div>
</div>

<script>
async function loadNews() {
  const container = document.getElementById('news-list');
  try {
    // 获取今天的日期来定位最新日报
    const now = new Date();
    // 尝试当天，如果失败则往前找
    let date = new Date(now);
    let html = null;
    let attempts = 0;
    while (!html && attempts < 7) {
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      const url = `/Horizon/${y}/${m}/${d}/summary-zh.html`;
      try {
        const resp = await fetch(url);
        if (resp.ok) {
          html = await resp.text();
          document.getElementById('subtitle').textContent = `${y}年${m}月${d}日 · 自动加载最新日报`;
        }
      } catch(e) {}
      date.setDate(date.getDate() - 1);
      attempts++;
    }
    if (!html) throw new Error('未找到日报');

    // 解析新闻条目
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // 提取新闻列表
    const items = [];
    const headings = doc.querySelectorAll('main h2');
    headings.forEach(h2 => {
      const link = h2.querySelector('a');
      if (!link) return;
      const title = link.textContent.trim();
      const url = link.getAttribute('href');
      // 评分
      const scoreMatch = h2.textContent.match(/⭐️\s*([\d.]+)/);
      const score = scoreMatch ? parseFloat(scoreMatch[1]) : 0;
      
      // 摘要 - 取 h2 后面的 p 标签
      let summary = '';
      let next = h2.nextElementSibling;
      while (next && next.tagName !== 'H2') {
        if (next.tagName === 'P' && !next.querySelector('a[href*="news.ycombinator"]') && !next.querySelector('strong')) {
          summary = next.textContent.trim();
          break;
        }
        next = next.nextElementSibling;
      }
      
      // 来源和社区链接
      let source = '';
      let discussion = '';
      next = h2.nextElementSibling;
      while (next && next.tagName !== 'H2') {
        if (next.tagName === 'P') {
          const text = next.textContent.trim();
          if (!text.startsWith('背景') && !text.startsWith('**背景')) {
            const srcLink = next.querySelector('a[href*="news.ycombinator"]');
            if (srcLink) discussion = srcLink.getAttribute('href');
            // 提取来源名称
            const parts = text.split('·');
            if (parts.length >= 2) source = parts[0].trim();
          }
        }
        next = next.nextElementSibling;
      }

      // 只取原始新闻链接（不是锚点 #item）
      if (url && !url.startsWith('#')) {
        items.push({ title, url, score, summary: summary.slice(0, 120), source, discussion });
      }
    });

    if (items.length === 0) throw new Error('未找到新闻条目');

    // 取前10条
    const top10 = items.slice(0, 10);
    
    // 渲染
    container.innerHTML = top10.map((item, i) => `
      <div class="news-item">
        <div class="rank">${i+1}</div>
        <h3>
          <a href="${item.url}" target="_blank">${item.title}</a>
          <span class="score ${item.score >= 8 ? 'score-high' : 'score-mid'}">${item.score.toFixed(1)}</span>
        </h3>
        <div class="meta">
          ${item.source ? `<span>📡 ${item.source}</span>` : ''}
          ${item.discussion ? `<a href="${item.discussion}" target="_blank" style="color:#868e96">💬 讨论</a>` : ''}
          <span style="color:#868e96">🔗 点击标题查看原文</span>
        </div>
        ${item.summary ? `<div class="summary">${item.summary}</div>` : ''}
      </div>
    `).join('');

  } catch(e) {
    container.innerHTML = `
      <div class="error">
        <p style="font-size:1.2rem;margin-bottom:8px">⚠️ 暂无日报数据</p>
        <p>暂未获取到最新新闻，请检查 Horizon 工作流是否已运行。</p>
        <p style="margin-top:12px"><a href="/Horizon/" style="color:#1971c2">👉 访问 Horizon 首页</a></p>
      </div>
    `;
  }
}
loadNews();
</script>
</body>
</html>
