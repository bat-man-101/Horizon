name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 0 * * *'  # UTC 0:30 = 北京时间 8:30
  workflow_dispatch:      # 手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Test webhook connectivity
        env:
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: |
          echo "测试 webhook URL 连通性..."
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"markdown","markdown":{"content":"#  GHA 连通性测试\n\n> 来自 GitHub Actions 运行环境的测试消息"}}' \
            "$HORIZON_WEBHOOK_URL")
          if [ "$RESP" = "200" ]; then
            echo "::notice::Webhook URL 连通性测试通过 (HTTP 200)"
          else
            echo "::warning::Webhook URL 测试返回 HTTP $RESP"
          fi

      - name: Run Horizon
        env:
          # AI API Keys (DeepSeek 推荐)
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GitHub Token (提高 API 速率限制, Secret 名不能以 GITHUB_ 开头)
          GH_PAT: ${{ secrets.GH_PAT }}
          # Webhook 推送 (企业微信/飞书/钉钉等)
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "📝 AI日报: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
