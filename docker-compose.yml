services:
  horizon:
    build: .
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    # 每天北京时间 9:00 自动运行
    # 如需一次性运行: docker compose run --rm horizon --hours 24
    command: ["--hours", "24"]
